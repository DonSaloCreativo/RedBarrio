<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LlamaBarrio - Revisor HTML</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ff7a00, #ffb347);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      color: white;
      text-align: left;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 760px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(4px);
    }

    .logo {
      width: 90px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 1rem;
      font-weight: normal;
      margin-bottom: 18px;
      opacity: 0.9;
    }

    p {
      font-size: 1rem;
      margin-bottom: 18px;
      opacity: 0.85;
    }

    .upload-box {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .upload-box input[type="file"] {
      flex: 1;
      min-width: 220px;
      color: #fff;
    }

    button {
      background: #111;
      color: #fff;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .results {
      margin-top: 18px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 14px;
      padding: 14px;
    }

    .results h3 {
      margin-bottom: 10px;
      font-size: 1.05rem;
    }

    .results ul {
      margin-left: 20px;
      display: grid;
      gap: 6px;
    }

    .results li {
      line-height: 1.4;
    }

    .summary {
      margin-bottom: 12px;
      font-size: 0.95rem;
    }

    .footer {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 20px;
      text-align: center;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.5rem; }
      .container { padding: 20px; }
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="./logo.png" alt="Logo LlamaBarrio" class="logo">

    <h1>🔎 Revisor de HTML</h1>
    <h2>Adjunta tu archivo .html y recibe retroalimentación concreta en segundos.</h2>

    <div class="upload-box">
      <input type="file" id="html-file" accept=".html,.htm,text/html">
      <button id="review-btn" type="button" disabled>Analizar archivo</button>
    </div>
    <p id="file-name">No hay archivo seleccionado.</p>

    <section class="results" id="results" hidden>
      <p class="summary" id="summary"></p>
      <h3>Recomendaciones</h3>
      <ul id="feedback-list"></ul>
    </section>

    <div class="footer">
      © 2026 LlamaBarrio - Todos los derechos reservados
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('html-file');
    const reviewButton = document.getElementById('review-btn');
    const fileName = document.getElementById('file-name');
    const results = document.getElementById('results');
    const summary = document.getElementById('summary');
    const feedbackList = document.getElementById('feedback-list');

    function addFeedback(items, message) {
      items.push(message);
    }

    function analyzeHtml(content) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(content, 'text/html');
      const items = [];
      const html = doc.documentElement;
      const title = doc.querySelector('title');
      const description = doc.querySelector('meta[name="description"]');
      const viewport = doc.querySelector('meta[name="viewport"]');
      const images = [...doc.querySelectorAll('img')];
      const imagesWithoutAlt = images.filter((img) => {
        if (!img.hasAttribute('alt')) return true;
        const altText = img.getAttribute('alt');
        return !altText || !altText.trim();
      });
      const h1Count = doc.querySelectorAll('h1').length;
      const formFields = [...doc.querySelectorAll('input, select, textarea')];
      const unlabeledFields = formFields.filter((field) => {
        const id = field.getAttribute('id');
        const hasAria = field.hasAttribute('aria-label') || field.hasAttribute('aria-labelledby');
        const hasLabel = id ? doc.querySelector(`label[for="${id}"]`) : field.closest('label');
        return !hasAria && !hasLabel;
      });
      const blankLinks = [...doc.querySelectorAll('a[target="_blank"]')];
      const unsafeBlankLinks = blankLinks.filter((link) => {
        const rel = (link.getAttribute('rel') || '').toLowerCase();
        return !(rel.includes('noopener') && rel.includes('noreferrer'));
      });
      const inlineStyles = doc.querySelectorAll('[style]').length;

      if (!html || !html.getAttribute('lang')) {
        addFeedback(items, '⚠️ Agrega el atributo <html lang="..."> para mejorar accesibilidad y SEO.');
      } else {
        addFeedback(items, `✅ Idioma detectado en <html>: "${html.getAttribute('lang')}".`);
      }

      if (!title || !title.textContent.trim()) {
        addFeedback(items, '⚠️ Falta la etiqueta <title>. Es clave para SEO y para pestañas del navegador.');
      } else {
        addFeedback(items, `✅ Título detectado (${title.textContent.trim().length} caracteres).`);
      }

      if (!description || !description.getAttribute('content') || !description.getAttribute('content').trim()) {
        addFeedback(items, '⚠️ Falta <meta name="description">. Ayuda al posicionamiento en buscadores.');
      } else {
        addFeedback(items, `✅ Meta descripción encontrada (${description.getAttribute('content').trim().length} caracteres).`);
      }

      if (!viewport) {
        addFeedback(items, '⚠️ Falta <meta name="viewport">. Es esencial para móviles.');
      } else {
        addFeedback(items, '✅ Meta viewport presente para diseño responsive.');
      }

      if (imagesWithoutAlt.length > 0) {
        addFeedback(items, `⚠️ ${imagesWithoutAlt.length} imagen(es) no tienen atributo alt. Incluye texto alternativo descriptivo.`);
      } else if (images.length > 0) {
        addFeedback(items, `✅ Todas las imágenes (${images.length}) incluyen texto alternativo.`);
      }

      if (h1Count === 0) {
        addFeedback(items, '⚠️ No se encontró un <h1>. Conviene tener uno principal por página.');
      } else if (h1Count > 1) {
        addFeedback(items, `⚠️ Se detectaron ${h1Count} etiquetas <h1>. Normalmente se recomienda usar solo una.`);
      } else {
        addFeedback(items, '✅ La jerarquía principal incluye un solo <h1>.');
      }

      if (unlabeledFields.length > 0) {
        addFeedback(items, `⚠️ ${unlabeledFields.length} campo(s) de formulario sin label o aria-label.`);
      } else if (formFields.length > 0) {
        addFeedback(items, `✅ Todos los campos de formulario (${formFields.length}) están etiquetados.`);
      }

      if (unsafeBlankLinks.length > 0) {
        addFeedback(items, `⚠️ ${unsafeBlankLinks.length} enlace(s) con target="_blank" sin rel="noopener noreferrer".`);
      } else if (blankLinks.length > 0) {
        addFeedback(items, `✅ Los enlaces target="_blank" incluyen rel seguro.`);
      }

      if (inlineStyles > 0) {
        addFeedback(items, `⚠️ Se detectaron ${inlineStyles} estilos inline. Muévelos a CSS para mejor mantenimiento.`);
      } else {
        addFeedback(items, '✅ No se detectaron estilos inline.');
      }

      return {
        elements: doc.querySelectorAll('*').length,
        images: images.length,
        links: doc.querySelectorAll('a').length,
        feedback: items
      };
    }

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      const hasFile = !!file;
      reviewButton.disabled = !hasFile;
      fileName.textContent = hasFile ? `Archivo seleccionado: ${file.name}` : 'No hay archivo seleccionado.';
      results.hidden = true;
    });

    reviewButton.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) return;

      const content = await file.text();
      const analysis = analyzeHtml(content);
      feedbackList.innerHTML = '';
      analysis.feedback.forEach((item) => {
        const li = document.createElement('li');
        li.textContent = item;
        feedbackList.appendChild(li);
      });

      summary.textContent = `Resumen del archivo: ${analysis.elements} elementos HTML, ${analysis.images} imágenes, ${analysis.links} enlaces.`;
      results.hidden = false;
    });
  </script>
</body>
</html>
