<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LlamaBarrio - Tu comunidad conectada</title>
    <link rel="stylesheet" href="style.css?v=17">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="brand">
            <img src="images/logo.png" alt="LlamaBarrio" class="logo-img">
        </div>
        
        <div class="location-selector">
            <select id="location-filter" class="nav-select" onchange="buscar()">
                </select>
        </div>

        <div class="search-bar">
            <input type="text" placeholder="¿Que quieres buscar hoy?" id="main-search">
            <button class="search-icon-btn" onclick="buscar()">🔍</button>
        </div>

        <div class="nav-actions">
            <button class="btn-picada" onclick="abrirFormDato()">Compartir picada</button>
            <button class="btn-negocio" onclick="abrirFormPromo()">Soy negocio</button>
        </div>
    </div>
</nav>

<main class="content-wrapper">
    <section class="suggestions">
        <h3 class="section-tag">🔥 El barrio recomienda</h3>
        <div id="cheap-scroll" class="circle-scroll"></div>
    </section>

    <section class="results">
        <h3 class="section-tag-bg">🍔 Resultados</h3>
        <div id="product-list" class="results-grid"></div>
    </section>

    <section id="featured-section" class="results" style="display:none;">
        <h3 class="section-tag-bg" style="background-color: #ffda79;">🌟 Destacados de tu comuna</h3>
        <div id="featured-list" class="results-grid"></div>
    </section>

    <section class="promo-banner">
        <div class="promo-card">
            <img src="https://via.placeholder.com/1200x400/00d2ff/ffffff?text=Tu+Llama+Comiendo+Aquí+-+Publicidad" alt="Publicidad LlamaBarrio" class="full-promo-img">
        </div>
    </section>
</main>

<footer class="main-footer">
    <div class="footer-content">
        <p><strong>LlamaBarrio © 2026</strong></p>
        <p>Términos y Condiciones | Políticas de Privacidad | Contacto: hola@llamabarrio.cl</p>
        <small>Plataforma informativa de promociones locales.</small>
    </div>
</footer>

<div id="productPopup" class="popup-overlay" style="display:none;">
    <div class="popup-content product-view">
        <button class="popup-close" onclick="cerrarPopupProducto()">X</button>
        <div id="popup-body"></div>
    </div>
</div>

<div id="popupPromo" class="popup-overlay" style="display:none;">
    <div class="popup-content">
        <button class="popup-close" onclick="cerrarFormPromo()">X</button>
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe-NoZ-wev8KO0U6LT2ko9Ly0NyZcCjkZ4A0eBF-1TbH2qZxA/viewform?embedded=true" width="100%" height="500"></iframe>
    </div>
</div>

<div id="popupDato" class="popup-overlay" style="display:none;">
    <div class="popup-content">
        <button class="popup-close" onclick="cerrarFormDato()">X</button>
        <iframe src="https://tally.so/r/ja7DOQ" width="100%" height="500"></iframe>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
