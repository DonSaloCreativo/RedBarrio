<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LlamaBarrio | Tu Guía Local</title>
    <link rel="stylesheet" href="style.css?v=201">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="brand">
            <img src="images/logo.png" alt="LlamaBarrio" class="logo-img">
        </div>
        
        <div class="header-controls-group">
            <div class="oval-control location-wrapper">
                <select id="location-filter" class="nav-select" onchange="buscar()">
                    <option value="">Comuna</option>
                </select>
            </div>
            <div class="oval-control search-bar-wrapper">
                <input type="text" placeholder="¿Qué quieres buscar hoy?" id="main-search" onkeyup="buscar()">
                <button class="search-icon-btn minimal" onclick="buscar()">🔍</button>
            </div>
        </div>

        <div class="nav-actions desktop-only">
            <button class="btn-picada-destacado" onclick="abrirFormDato()">Compartir picada</button>
            <button class="btn-negocio-small" onclick="abrirFormPromo()">Soy negocio</button>
        </div>
    </div>
</nav>

<main class="content-wrapper">
    <section class="suggestions">
        <h2 class="section-title">🔥 El barrio recomienda</h2>
        <div id="cheap-scroll" class="circle-scroll"></div>
    </section>

    <section class="results">
        <h2 class="section-title">🍔 Resultados</h2>
        <div id="product-list" class="results-grid"></div>
        <div id="no-results" style="display:none; text-align:center; padding:40px;">❌ No encontramos resultados.</div>
    </section>
</main>

<div id="productPopup" class="popup-overlay" onclick="cerrarModalExterno(event)">
    <div class="popup-content product-view compact">
        <button class="popup-close" onclick="cerrarPopupProducto()">X</button>
        <div id="popup-body"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
