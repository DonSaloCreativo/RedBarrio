<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RedBarrio</title>
  <link rel="stylesheet" href="style.css?v=8">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

<!-- HEADER -->
<header class="hero">
  <img src="images/logo.png" class="logo">
  <p class="subtitle">Conectando vecinos con promociones reales</p>
  <div class="banner-buttons">
    <a href="javascript:void(0)" class="btn-banner highlight" onclick="abrirFormDato()">
      <i class="fas fa-camera"></i> Comparte tu picada
    </a>
    <a href="javascript:void(0)" class="btn-banner" onclick="abrirFormPromo()">
      <i class="fas fa-store"></i> Soy Negocio
    </a>
  </div>
</header>

<!-- PICADAS DE VECINOS -->
<h2 class="section-title purple-text">📸 Picadas de nuestros vecinos</h2>
<div id="cheap-scroll"></div>

<!-- BUSCADOR -->
<div class="search-box">
  <label>📍 ¿En qué comuna estás?</label>
  <select id="location-filter"></select>
  <label>🍔 ¿Qué estás buscando?</label>
  <input type="text" id="search-input" placeholder="Ej: pizza, sushi, gasfiter...">
  <button onclick="buscar()" class="search-btn">Buscar</button>
</div>

<!-- DESTACADOS -->
<h2 class="section-title blue-text">🔥 Destacados de tu comuna</h2>
<div id="featured-scroll"></div>

<!-- TODAS LAS PROMOCIONES -->
<h2 class="section-title yellow-bg">📍 Todas las promociones</h2>
<ul id="product-list"></ul>

<!-- FOOTER -->
<footer>
  <p>© 2026 RedBarrio. All rights reserved.</p>
</footer>

<!-- POPUP GOOGLE FORM (Soy Negocio) -->
<div id="popupPromo" class="popup-overlay" style="display:none;">
  <div class="popup-content" style="width:90%; max-width:600px;">
    <button class="popup-close" onclick="cerrarFormPromo()">X</button>
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe-NoZ-wev8KO0U6LT2ko9Ly0NyZcCjkZ4A0eBF-1TbH2qZxA/viewform?embedded=true" width="100%" height="500" style="border:none; border-radius:12px;"></iframe>
  </div>
</div>

<!-- POPUP TALLY (Comparte tu picada) -->
<div id="popupDato" class="popup-overlay" style="display:none;">
  <div class="popup-content" style="width:90%; max-width:600px;">
    <button class="popup-close" onclick="cerrarFormDato()">X</button>
    <iframe src="https://tally.so/r/ja7DOQ" width="100%" height="500" style="border:none; border-radius:12px;"></iframe>
  </div>
</div>

<script src="script.js"></script>
<script>
  function abrirFormPromo() { document.getElementById("popupPromo").style.display = "flex"; }
  function cerrarFormPromo() { document.getElementById("popupPromo").style.display = "none"; }
  function abrirFormDato() { document.getElementById("popupDato").style.display = "flex"; }
  function cerrarFormDato() { document.getElementById("popupDato").style.display = "none"; }

  window.onclick = function(e) {
    const promo = document.getElementById("popupPromo");
    const dato = document.getElementById("popupDato");
    if (e.target === promo) promo.style.display = "none";
    if (e.target === dato) dato.style.display = "none";
  }
</script>

</body>
</html>
