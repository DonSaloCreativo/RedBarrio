<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RedBarrio</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="hero">
  <img src="logo.png" class="logo">
  <p class="subtitle">Conectamos vecinos con promociones reales en su comuna</p>
</header>

<!-- CAJA DE BÚSQUEDA -->
<div class="search-box">
  <label>📍 ¿En qué comuna estás?</label>
  <select id="location-filter"></select>

  <label>🍔 ¿Qué estás buscando?</label>
  <input type="text" id="search-input" placeholder="Ej: pizza, sushi, gasfiter...">
  <button id="search-btn" class="search-btn">Buscar</button>
</div>

<!-- ALERTA -->
<p class="info-text">
  ⚠️ RedBarrio no vende productos. Solo conecta promociones locales.
</p>

<!-- SECCIONES DE PROMOCIONES -->
<h2 class="section-title">💸 Lo más barato hoy</h2>
<div id="cheap-scroll"></div>

<h2 class="section-title">🔥 Destacados de tu comuna</h2>
<div id="featured-scroll"></div>

<h2 class="section-title">📍 Todas las promociones</h2>
<ul id="product-list"></ul>

<!-- BOTONES -->
<button id="whatsapp-btn">📝 Publicar promoción</button>
<button id="contact-btn">📩 Contacto</button>

<!-- SCRIPT -->
<script src="script.js"></script>

<script>
// FUNCIONALIDAD DEL BOTÓN BUSCAR
const searchBtn = document.getElementById("search-btn");
searchBtn.addEventListener("click", () => {
  const inputEvent = new Event('input', { bubbles: true });
  document.getElementById("search-input").dispatchEvent(inputEvent);
});
</script>

</body>
</html>
